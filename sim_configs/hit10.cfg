# CFG file for HIT + 10 deformable spherical particles
# Keyword                  Input
#
# IO PARAMETERS
ntracers                  0
frames                    200
chkpt_freq                50
# dump_code (additive)
# 1 = tracer
# 2 = contour
# 4 = specific slices
# 8 = chkpt files
# 16 = diagnostic file
dump_code                 12
# out_flag bitmask:
# 1:vx 2:vy 4:vz 8:wx 16:wy 32:wz 64:|w| 128:p ...
# only output wz:
out_flag                  32
output_dim                2
output_ind                32

#
# DOMAIN BOUNDARY CONDITIONS (HIT 三向周期)
x_prd                     1
y_prd                     1
z_prd                     1

# 周期边界下这些BC基本不会生效
bc_xl                     0 0 0 0 0 0
bc_xh                     0 0 0 0 0 0
bc_yl                     0 0 0 0 0 0
bc_yh                     0 0 0 0 0 0
bc_zl                     0 0 0 0 0 0
bc_zh                     0 0 0 0 0 0

# 墙面关闭
walls                     0 0 0 0 0 0
wall_pos                  0 1 0 1 0 1
wall_dist                 0.0

#
# SOLVER PARAMETERS
sys_size                  164 164 164
# HIT 常用立方体周期域 2*pi
xyz_bounds                0 6.283185307179586 0 6.283185307179586 0 6.283185307179586

dt                        0.001
T                         5

#
# SIMULATION TYPE CONFIGURATIONS
sim_type                  objects

#
# FLUID PROPERTIES
fmu                       0.005428
fdt_pad                   0.5
data_fmt                  0

# Isotropic turbulence background
turb_iso_enable           1
turb_mode_count           64
turb_kf2                  3
turb_seed                 13579
turb_kd                   50.0
turb_re_lam               84.0

#
# SOLIDS CONFIGURATIONS

# 10 个可变形球颗粒

# 按现有示例，球对象使用 object_list = 1

# basic_specs: [index cx cy cz radius]
# 直径 0.1 => radius = 0.05

# extra_specs: [index + 10个参数]
# 参考现有 sphere 示例给默认不预拉伸参数

# 颗粒密度与剪切模量（可变形）


gravity                   0.0

